<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TSURITO AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f8f5;--card:#fff;--card2:#eef4ef;
  --bdr:#ccdece;--bdr2:#aac8b5;
  --txt:#1a2e1e;--txt2:#4a6854;--txt3:#8aaa8e;
  --g1:#1a5c2a;--g2:#2a8040;--gl:rgba(42,128,64,.12);
  --amb:#c47a0a;--ambl:rgba(196,122,10,.1);
  --sky:#1a5c9a;--skyl:rgba(26,92,154,.1);
  --coral:#c43020;--corall:rgba(196,48,32,.1);
  --pur:#6a3aaa;--purl:rgba(106,58,170,.1);
  --ocean:#0a7a9a;--oceanl:rgba(10,122,154,.1);
  --r:12px;--r2:18px;--rf:9999px;
  --sat:env(safe-area-inset-top,44px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Noto Sans JP',sans-serif;font-size:15px;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
#login-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#e8f5eb,#f0faf2,#e0eed8);z-index:9999;}
.login-logo{text-align:center;margin-bottom:22px;}
.login-logo .mark{font-size:52px;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 14px rgba(26,92,42,.28));}
.login-logo h1{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;letter-spacing:4px;color:var(--g1);}
.login-logo p{font-size:11px;color:var(--txt3);margin-top:5px;letter-spacing:3px;text-transform:uppercase;}
.login-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r2);padding:24px 20px;width:min(400px,100%);box-shadow:0 8px 32px rgba(26,92,42,.12);}
.lf{margin-bottom:13px;}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:2px;margin-bottom:5px;text-transform:uppercase;}
.lf input{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--txt);outline:none;font-family:inherit;transition:.15s;}
.lf input:focus{border-color:var(--g2);box-shadow:0 0 0 3px var(--gl);background:#fff;}
.login-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:16px;}
.login-tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--txt3);transition:.15s;}
.login-tab.active{background:var(--g1);color:#fff;box-shadow:0 2px 8px rgba(26,92,42,.25);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 16px rgba(26,92,42,.25);}
.login-btn:active{opacity:.85;}
.login-err{font-size:12px;color:var(--coral);text-align:center;min-height:16px;margin-top:8px;font-weight:600;}
.login-divider{text-align:center;color:var(--txt3);font-size:11px;margin:10px 0;position:relative;}
.login-divider::before,.login-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--bdr);}
.login-divider::before{left:0;}.login-divider::after{right:0;}
.key-wrap{position:relative;}
.key-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;padding:2px;}
#app{display:none;height:100dvh;flex-direction:column;}
#app.show{display:flex;}
.app-hd{background:var(--g1);color:#fff;padding:calc(var(--sat) + 6px) 12px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.18);}
.hd-logo{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;color:#fff;flex:1;min-width:0;}
.hd-logo small{font-size:10px;font-weight:400;letter-spacing:1px;opacity:.72;margin-left:6px;}
.hd-plan{font-size:11px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.12);border-radius:var(--rf);padding:4px 10px;border:1px solid rgba(255,255,255,.2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none;flex-shrink:0;}
.hd-user{font-size:11px;color:rgba(255,255,255,.75);background:rgba(255,255,255,.15);border-radius:var(--rf);padding:4px 10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.hbtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.hbtn:active{background:rgba(255,255,255,.3);}
.mode-bar{display:flex;gap:4px;padding:7px 10px 5px;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.mode-bar::-webkit-scrollbar{display:none;}
.mode-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--rf);border:1.5px solid var(--bdr);font-size:12px;font-weight:700;color:var(--txt2);background:transparent;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0;}
.mode-btn.active{border-color:var(--g2);color:var(--g1);background:var(--gl);}
.mode-btn.active.search{border-color:var(--ocean);color:var(--ocean);background:var(--oceanl);}
.mode-btn.active.url{border-color:var(--sky);color:var(--sky);background:var(--skyl);}
.mode-btn.active.kyureki{border-color:var(--pur);color:var(--pur);background:var(--purl);}
.mode-btn.active.photo{border-color:var(--amb);color:var(--amb);background:var(--ambl);}
.mode-btn:active{opacity:.75;}
.url-bar{display:none;padding:5px 10px;background:#eef6fc;border-bottom:1px solid var(--bdr);align-items:center;gap:6px;flex-shrink:0;}
.url-bar.show{display:flex;}
.url-inp{flex:1;background:#fff;border:1.5px solid var(--bdr2);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--txt);outline:none;font-family:inherit;}
.url-inp:focus{border-color:var(--sky);}
.url-clear{background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;padding:0 4px;}
.kyureki-bar{display:none;padding:5px 12px;background:linear-gradient(90deg,#f0eafc,#f8f4ff);border-bottom:1px solid var(--bdr);flex-shrink:0;font-size:11px;color:var(--pur);font-weight:600;}
.kyureki-bar.show{display:flex;align-items:center;gap:8px;}
.quick-wrap{padding:6px 10px 4px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--card);}
.quick-wrap::-webkit-scrollbar{display:none;}
.qbtn{font-size:11px;font-weight:700;padding:5px 11px;border:1.5px solid var(--bdr);border-radius:var(--rf);background:var(--card2);color:var(--txt2);cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0;}
.qbtn:active{background:var(--g1);color:#fff;border-color:var(--g1);}
.img-bar{display:none;padding:7px 10px;background:#fff8ec;border-top:1px solid var(--bdr);align-items:center;gap:8px;flex-shrink:0;}
.img-bar.show{display:flex;}
.img-thumb{width:40px;height:40px;object-fit:cover;border-radius:8px;border:1.5px solid var(--bdr);}
.img-lbl{flex:1;font-size:11px;color:var(--txt2);font-weight:700;}
.img-rm{background:var(--coral);color:#fff;border:none;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;}
.msgs{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:10px;overscroll-behavior:contain;background:var(--bg);}
.msg{display:flex;gap:8px;animation:popIn .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--card2);border:1.5px solid var(--bdr);}
.msg.user .avatar{background:var(--gl);border-color:var(--g2);}
.bubble{max-width:86%;padding:10px 13px;border-radius:var(--r);font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.msg.bot .bubble{background:#fff;border:1px solid var(--bdr);color:var(--txt);border-radius:4px var(--r) var(--r) var(--r);box-shadow:0 1px 4px rgba(0,0,0,.05);}
.msg.user .bubble{background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;border-radius:var(--r) 4px var(--r) var(--r);font-weight:500;}
.bubble img.att{max-width:200px;border-radius:10px;border:1px solid var(--bdr);margin-top:8px;display:block;}
.typing-dots{display:flex;gap:5px;padding:4px 2px;align-items:center;}
.typing-dots span{width:8px;height:8px;border-radius:50%;background:var(--g2);animation:dot .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.25s;}
.typing-dots span:nth-child(3){animation-delay:.5s;}
@keyframes dot{0%,80%,100%{transform:scale(.4);opacity:.25}40%{transform:scale(1.1);opacity:1}}
.sys-notice{text-align:center;font-size:11px;color:var(--txt3);padding:4px 0;}
.inp-bar{background:var(--card);border-top:1px solid var(--bdr);padding:7px 10px calc(7px + var(--sab));flex-shrink:0;box-shadow:0 -2px 10px rgba(0,0,0,.06);}
.inp-tools{display:flex;gap:5px;margin-bottom:6px;align-items:center;}
.tool-btn{background:var(--card2);border:1.5px solid var(--bdr);color:var(--txt2);border-radius:10px;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.tool-btn:active{background:var(--gl);border-color:var(--g2);}
.tool-btn.rec{background:var(--corall);border-color:var(--coral);color:var(--coral);animation:recglow .8s infinite alternate;}
@keyframes recglow{from{box-shadow:0 0 0 0 rgba(196,48,32,.35)}to{box-shadow:0 0 0 7px rgba(196,48,32,0)}}
.mode-ind{font-size:11px;font-weight:700;margin-left:auto;flex-shrink:0;padding:4px 10px;border-radius:var(--rf);background:var(--gl);color:var(--g1);border:1px solid rgba(42,128,64,.2);}
.voice-stat{display:none;font-size:11px;color:var(--coral);font-weight:700;padding:3px 10px;border-radius:var(--rf);background:var(--corall);border:1px solid rgba(196,48,32,.2);}
.inp-row{display:flex;gap:6px;align-items:flex-end;}
.inp-ta{flex:1;background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;font-size:14px;resize:none;outline:none;line-height:1.55;max-height:110px;min-height:44px;font-family:inherit;color:var(--txt);transition:.15s;}
.inp-ta:focus{border-color:var(--g2);box-shadow:0 0 0 3px var(--gl);background:#fff;}
.inp-ta::placeholder{color:var(--txt3);}
.send-btn{background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;border:none;border-radius:var(--r);width:48px;height:48px;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,92,42,.25);transition:.15s;}
.send-btn:active{transform:scale(.93);opacity:.85;}
.send-btn:disabled{background:var(--card2);color:var(--txt3);box-shadow:none;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">
    <span class="mark">&#127907;</span>
    <h1>TSURITO AI</h1>
    <p>World's Best Fishing Intelligence</p>
  </div>
  <div class="login-card">
    <div class="login-tabs">
      <div class="login-tab active" id="tab-email" onclick="switchTab('email')">&#128231; メール</div>
      <div class="login-tab" id="tab-key" onclick="switchTab('key')">&#128273; アクセスキー</div>
    </div>
    <div id="login-email-form">
      <div class="lf"><label>メールアドレス</label><input type="email" id="l-email" placeholder="example@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')handleLogin()"></div>
      <div class="lf"><label>パスワード</label><input type="password" id="l-pass" placeholder="パスワード（6文字以上）" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()"></div>
      <div class="login-divider">新規登録は確認用パスワードも入力</div>
      <div class="lf"><label>確認用パスワード（新規登録時のみ）</label><input type="password" id="l-pass2" placeholder="（ログインは空欄でOK）" autocomplete="new-password"></div>
    </div>
    <div id="login-key-form" style="display:none">
      <div class="lf"><label>アクセスキー</label>
        <div class="key-wrap"><input type="password" id="l-key" placeholder="TSURITO-2026-..." autocomplete="off" onkeydown="if(event.key==='Enter')handleLogin()">
        <button class="key-eye" onclick="toggleKeyEye()">&#128065;</button></div>
      </div>
    </div>
    <div class="login-err" id="l-err"></div>
    <button class="login-btn" id="l-btn" onclick="handleLogin()">&#127907; 釣りAIに入室する</button>
  </div>
</div>

<div id="app">
  <div class="app-hd">
    <div class="hd-logo">&#127907; TSURITO <small>AI — Gemini 2.5 Flash</small></div>
    <div class="hd-plan" id="hd-plan"></div>
    <div class="hd-user" id="user-badge"></div>
    <button class="hbtn" onclick="showHistModal()">&#128203;</button>
    <button class="hbtn" onclick="doLogout()">&#128682;</button>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="m-normal" onclick="setMode('normal')">&#128172; 通常</button>
    <button class="mode-btn" id="m-search" onclick="setMode('search')">&#128269; Google検索</button>
    <button class="mode-btn" id="m-url" onclick="setMode('url')">&#128279; URL解析</button>
    <button class="mode-btn" id="m-kyureki" onclick="setMode('kyureki')">&#127769; 旧暦釣果</button>
    <button class="mode-btn" id="m-photo" onclick="setMode('photo')">&#128248; 魚判定</button>
  </div>
  <div class="url-bar" id="url-bar">
    <span style="font-size:13px;color:var(--sky);font-weight:700;flex-shrink:0">&#128279; URL</span>
    <input class="url-inp" id="url-inp" type="url" placeholder="https://... 釣果ブログのURLを貼る">
    <button class="url-clear" onclick="clearUrl()">&#10005;</button>
  </div>
  <div class="kyureki-bar" id="kyureki-bar">
    <span>&#127769;</span><span id="kyureki-txt"></span>
  </div>
  <div class="quick-wrap" id="quick-wrap"></div>
  <div class="img-bar" id="img-bar">
    <img class="img-thumb" id="img-thumb" src="" alt="">
    <div class="img-lbl" id="img-lbl"></div>
    <button class="img-rm" onclick="clearAttach()">削除</button>
  </div>
  <div class="msgs" id="msgs">
    <div class="sys-notice">&#127907; TSURITO AI — Gemini 2.5 Flash x Google検索 x URLコンテキスト</div>
  </div>
  <div class="inp-bar">
    <div class="inp-tools">
      <button class="tool-btn" id="mic-btn" onclick="toggleVoice()">&#127908;</button>
      <button class="tool-btn" onclick="triggerCamera()">&#128247;</button>
      <button class="tool-btn" onclick="triggerImage()">&#128444;</button>
      <div class="voice-stat" id="voice-stat">&#128308; 録音中...</div>
      <div class="mode-ind" id="mode-ind">&#128172; 通常</div>
    </div>
    <div class="inp-row">
      <textarea class="inp-ta" id="main-ta" rows="1" placeholder="釣りのことなら何でも..." onkeydown="onTaKey(event)" oninput="resizeTa(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">&#127907;</button>
    </div>
  </div>
  <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none" onchange="onFileSelected(event,'image')">
  <input type="file" id="img-input" accept="image/*" style="display:none" onchange="onFileSelected(event,'image')">
</div>

<div id="hist-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:8000;align-items:flex-end;justify-content:center;" onclick="closeHistModal()">
  <div onclick="event.stopPropagation()" style="background:#fff;border-radius:var(--r2) var(--r2) 0 0;width:100%;max-width:460px;max-height:80dvh;overflow-y:auto;padding:16px 14px calc(20px + var(--sab));">
    <div style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--g1);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
      &#128203; 会話履歴
      <button onclick="closeHistModal()" style="background:none;border:none;color:var(--txt3);font-size:22px;cursor:pointer;">&#10005;</button>
    </div>
    <button onclick="newChat()" style="width:100%;padding:11px;background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px;">+ 新しい会話を始める</button>
    <div id="hist-list"></div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,collection,doc,setDoc,getDoc,getDocs,addDoc,deleteDoc,orderBy,query,serverTimestamp,limit}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const cfg={

<script>
function fb(){return window.__fb;}
'use strict';
var FUNCTIONS_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:5001/kensetsu-nippo-842a2/us-central1':'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net';
var ACCESS_KEY='TSURITO-2026-FISH';
var AI_SYS='あなたはTSURITO AI。世界最高の釣り情報AIである。釣り人の立場に立ち、科学的根拠・実釣情報・エサとルアー両軸で即座に具体的なアドバイスを提供することに全力を尽くせ。\n\n【回答ルール】\n- エサ釣りとルアー釣りの両方の視点から回答する\n- 潮回り・月齢・時間帯の釣果への影響を科学的に説明（Knight 1936・Blaxter 1980等）\n- 冗長な前置きは不要。現場で即使える情報に徹する\n- 旧暦同日の潮回り類似性を活用した釣果予測を行う';
var state={mode:'normal',history:[],attachData:null,attachType:null,attachName:'',busy:false,uid:null,keyLogin:false,currentChatId:null,fishing:{place:'',fish:'',tide:'',time:''}};

async function callGemini(prompt,useSearch,useUrl,mediaContents){
  var body={prompt,model:'gemini-2.5-flash'};
  if(useSearch)body.useSearch=true;
  if(useUrl)body.useUrl=useUrl;
  if(mediaContents&&mediaContents.length)body.mediaContents=mediaContents;
  var r=await fetch(FUNCTIONS_BASE+'/askClaude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){var e=await r.json().catch(()=>({}));throw new Error('通信エラー '+(e?.error?.message||r.status));}
  var d=await r.json();
  return d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||d?.result||'応答なし';
}

function initAuth(){
  if(!window.__fb){window.addEventListener('fbReady',initAuth,{once:true});return;}
  fb().onAuthStateChanged(fb().auth,function(user){
    if(user){state.uid=user.uid;showApp(user.email);}
    else if(!state.keyLogin){showLogin();}
  });
}
document.addEventListener('DOMContentLoaded',initAuth);

var loginTabMode='email';
function switchTab(t){
  loginTabMode=t;
  document.getElementById('tab-email').classList.toggle('active',t==='email');
  document.getElementById('tab-key').classList.toggle('active',t==='key');
  document.getElementById('login-email-form').style.display=t==='email'?'block':'none';
  document.getElementById('login-key-form').style.display=t==='key'?'block':'none';
}
function toggleKeyEye(){var i=document.getElementById('l-key');i.type=i.type==='password'?'text':'password';}
function handleLogin(){if(loginTabMode==='email')doLogin();else doKeyLogin();}

async function doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var pass=document.getElementById('l-pass').value;
  var pass2=document.getElementById('l-pass2').value;
  var err=document.getElementById('l-err');
  err.textContent='';
  if(!email||!pass){err.textContent='メールとパスワードを入力してください';return;}
  var btn=document.getElementById('l-btn');btn.textContent='認証中...';btn.disabled=true;
  try{
    if(pass2){
      if(pass!==pass2){err.textContent='パスワードが一致しません';btn.textContent='釣りAIに入室する';btn.disabled=false;return;}
      await fb().createUserWithEmailAndPassword(fb().auth,email,pass);
    }else{
      await fb().signInWithEmailAndPassword(fb().auth,email,pass);
    }
  }catch(e){
    var m={'auth/invalid-credential':'メールまたはパスワードが間違っています','auth/email-already-in-use':'このメールは登録済みです（確認用パスワードを空欄にしてください）','auth/weak-password':'パスワードは6文字以上','auth/too-many-requests':'しばらく待ってから再試行してください','auth/invalid-email':'メールアドレスの形式が正しくありません'};
    err.textContent=m[e.code]||'ログインに失敗しました: '+e.code;
  }
  btn.textContent='釣りAIに入室する';btn.disabled=false;
}

function doKeyLogin(){
  var key=document.getElementById('l-key').value.trim();
  if(key===ACCESS_KEY){state.keyLogin=true;state.uid='key-'+Date.now();showApp('ゲストユーザー');}
  else{document.getElementById('l-err').textContent='アクセスキーが正しくありません';}
}

async function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  if(!state.keyLogin){await fb().signOut(fb().auth);}
  state.keyLogin=false;state.uid=null;showLogin();
}

function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app').classList.remove('show');}
function showApp(email){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('user-badge').textContent=email||'';
  appendMsg('bot','こんにちは！TSURITO AIです。\n\n今日の釣果・釣り方・仕掛け・ポイント・魚判定など何でも聞いてください。\n\nGoogle検索モード→最新釣果をリアルタイム検索\nURL解析モード→釣果ブログを直接解析\n旧暦釣果モード→去年の同旧暦日の釣果を検索\n魚判定モード→写真から魚種・食べ方を判定\nマイクボタン→音声で質問');
  initQuick();updateKyurekiBar();loadChatHistory();
}

function setMode(m){
  state.mode=m;
  ['normal','search','url','kyureki','photo'].forEach(function(k){
    var btn=document.getElementById('m-'+k);if(!btn)return;
    btn.classList.remove('active','search','url','kyureki','photo');
    if(k===m){btn.classList.add('active');if(k!=='normal')btn.classList.add(k);}
  });
  document.getElementById('url-bar').classList.toggle('show',m==='url');
  document.getElementById('kyureki-bar').classList.toggle('show',m==='kyureki');
  var ta=document.getElementById('main-ta');
  var ind=document.getElementById('mode-ind');
  var cfg2={normal:{ph:'釣りのことなら何でも...',ind:'通常',bg:'var(--gl)',c:'var(--g1)'},search:{ph:'Google検索で最新釣果を調べます...',ind:'Google検索',bg:'var(--oceanl)',c:'var(--ocean)'},url:{ph:'URLのページについて質問...',ind:'URL解析',bg:'var(--skyl)',c:'var(--sky)'},kyureki:{ph:'場所と魚種を入力 例：大阪湾 タチウオ',ind:'旧暦釣果',bg:'var(--purl)',c:'var(--pur)'},photo:{ph:'魚の写真を送ると種類・食べ方を判定',ind:'魚判定',bg:'var(--ambl)',c:'var(--amb)'}};
  var s=cfg2[m]||cfg2.normal;
  ta.placeholder=s.ph;ind.textContent=s.ind;ind.style.background=s.bg;ind.style.color=s.c;
  if(m==='photo')triggerImage();
}
function clearUrl(){document.getElementById('url-inp').value='';setMode('normal');}

var QBTNS=[{l:'今日の釣果',q:'今日の釣果を教えてください'},{l:'今日の潮',q:'今日の潮回りと釣れる魚を教えて'},{l:'朝マズメ',q:'朝マズメに釣れる魚と釣り方を教えて'},{l:'タチウオ',q:'タチウオのエサ釣りとワインドを教えて'},{l:'アジング',q:'アジングの仕掛けとコツを教えて'},{l:'エギング',q:'アオリイカのエギング基本テクニックを教えて'},{l:'タコ釣り',q:'タコのテンヤとタコエギの釣り方を教えて'},{l:'大潮攻略',q:'大潮に釣果を最大化する方法を科学的に教えて'},{l:'旧暦比較',q:'今日の旧暦と去年の同旧暦日の釣果を比較して'}];
function initQuick(){document.getElementById('quick-wrap').innerHTML=QBTNS.map(function(b){return'<button class="qbtn" onclick="quickSend(this.dataset.q)" data-q="'+b.q+'">'+b.l+'</button>';}).join('');}
function quickSend(q){document.getElementById('main-ta').value=q;sendMsg();}

function calcAge(d){var k=new Date(2000,0,6,18,14,0);var a=(d-k)/86400000%29.530588853;if(a<0)a+=29.530588853;return Math.round(a*10)/10;}
function getLunar(date){var a=calcAge(date);var day=Math.min(30,Math.ceil(a)+1);var doy=Math.floor((date-new Date(date.getFullYear(),0,1))/86400000);var month=Math.min(12,Math.max(1,Math.floor(doy/29.53)+1));return{month:month,day:day,age:a};}
function getSameLunarDay(lm,ld,year){var base=new Date(year,0,1);var best=null;var bestDiff=999;for(var i=0;i<400;i++){var dt=new Date(base);dt.setDate(base.getDate()+i);var a=calcAge(dt);var d2=Math.min(30,Math.ceil(a)+1);var doy=Math.floor((dt-new Date(dt.getFullYear(),0,1))/86400000);var m2=Math.min(12,Math.max(1,Math.floor(doy/29.53)+1));var diff=Math.abs(m2*30+d2-(lm*30+ld));if(diff<bestDiff){bestDiff=diff;best=dt;}if(m2===lm&&d2===ld){best=dt;break;}}return best;}
function tPhase(a){if(a<2||a>27.5)return'大潮';if(a>=13&&a<16.5)return'大潮';if((a>=2&&a<4.5)||(a>25&&a<=27.5))return'中潮';if((a>=11&&a<13)||(a>=16.5&&a<18.5))return'中潮';if((a>=9.5&&a<10.5)||(a>=23&&a<24))return'長潮';if((a>=10.5&&a<11)||(a>=24&&a<25))return'若潮';return'小潮';}

function updateKyurekiBar(){
  var now=new Date();var lunar=getLunar(now);
  var ly1=getSameLunarDay(lunar.month,lunar.day,now.getFullYear()-1);
  var ly2=getSameLunarDay(lunar.month,lunar.day,now.getFullYear()-2);
  var txt='今日 旧暦'+lunar.month+'月'+lunar.day+'日';
  if(ly1)txt+=' / 昨年の同旧暦日：'+(ly1.getFullYear())+'/'+(ly1.getMonth()+1)+'/'+ly1.getDate();
  if(ly2)txt+=' / 一昨年：'+(ly2.getFullYear())+'/'+(ly2.getMonth()+1)+'/'+ly2.getDate();
  document.getElementById('kyureki-txt').textContent=txt;
}

function extractFishing(text){
  var f=state.fishing;
  var pm=text.match(/(大阪湾|東京湾|[^\s]{2,6}[市区町村港湾岸]|[^\s]{2,4}川|[^\s]{2,4}湖)/);if(pm)f.place=pm[1];
  var fm=text.match(/(アジ|サバ|シーバス|タチウオ|マダイ|ブリ|ハマチ|クロダイ|メバル|カサゴ|カレイ|ヒラメ|アオリイカ|タコ|キス|ハゼ|グレ|アユ|バス)/);if(fm)f.fish=fm[1];
  var tm=text.match(/(大潮|中潮|小潮|長潮|若潮)/);if(tm)f.tide=tm[1];
  var ti=text.match(/(朝マズメ|夕マズメ|日中|夜釣り)/);if(ti)f.time=ti[1];
  var parts=[];if(f.place)parts.push(f.place);if(f.fish)parts.push(f.fish);if(f.time)parts.push(f.time);
  var hdp=document.getElementById('hd-plan');if(parts.length){hdp.textContent=parts.join(' · ');hdp.style.display='block';}
}
function buildFishCtx(){
  var f=state.fishing;var parts=[];
  if(f.place)parts.push('場所：'+f.place);if(f.fish)parts.push('魚種：'+f.fish);if(f.tide)parts.push('潮：'+f.tide);if(f.time)parts.push('時間帯：'+f.time);
  return parts.length?'\n\n【確定した釣り条件】\n'+parts.join('\n'):'';
}

var voiceRec=null,voiceOn=false;
function toggleVoice(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){alert('音声入力未対応。Chromeをお試しください。');return;}
  var btn=document.getElementById('mic-btn');var vs=document.getElementById('voice-stat');
  if(voiceOn){voiceRec&&voiceRec.stop();voiceOn=false;btn.classList.remove('rec');vs.style.display='none';return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  voiceRec=new SR();voiceRec.lang='ja-JP';voiceRec.continuous=false;voiceRec.interimResults=true;
  var ta=document.getElementById('main-ta');voiceOn=true;btn.classList.add('rec');vs.style.display='block';
  voiceRec.onresult=function(e){var t='';for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;ta.value=t;resizeTa(ta);};
  voiceRec.onend=function(){voiceOn=false;btn.classList.remove('rec');vs.style.display='none';};
  voiceRec.onerror=function(e){voiceOn=false;btn.classList.remove('rec');vs.style.display='none';if(e.error!=='no-speech')alert('音声エラー: '+e.error);};
  voiceRec.start();
}

function triggerCamera(){document.getElementById('cam-input').click();}
function triggerImage(){document.getElementById('img-input').click();}
function onFileSelected(e,type){
  var file=e.target.files[0];if(!file)return;
  state.attachName=file.name;
  var reader=new FileReader();
  reader.onload=function(ev){
    state.attachData=ev.target.result;state.attachType=type;
    document.getElementById('img-thumb').src=ev.target.result;
    document.getElementById('img-lbl').textContent=file.name+' ('+Math.round(file.size/1024)+'KB)';
    document.getElementById('img-bar').classList.add('show');
    if(state.mode==='photo'){var ta=document.getElementById('main-ta');if(!ta.value)ta.value='この魚の種類・特徴・美味しい食べ方・生息域・サイズを詳しく教えてください。';}
  };
  reader.readAsDataURL(file);e.target.value='';
}
function clearAttach(){state.attachData=null;state.attachType=null;state.attachName='';document.getElementById('img-bar').classList.remove('show');document.getElementById('img-thumb').src='';}

async function sendMsg(){
  if(state.busy)return;
  var ta=document.getElementById('main-ta');var text=ta.value.trim();
  if(!text&&!state.attachData)return;
  state.busy=true;document.getElementById('send-btn').disabled=true;
  var dispText=text;
  if(state.mode==='url'){var u=document.getElementById('url-inp').value.trim();if(u)dispText='URL: '+u+'\n\n'+text;}
  if(state.mode==='kyureki')dispText='旧暦釣果: '+text;
  appendMsg('user',dispText,state.attachData&&state.attachType==='image'?state.attachData:null);
  ta.value='';resizeTa(ta);
  extractFishing(text);
  state.history.push({role:'user',content:text});
  var mc=null;if(state.attachData&&state.attachType==='image'){mc=[{base64:state.attachData,type:'image/jpeg'}];}
  clearAttach();
  var typEl=appendTyping();
  try{
    var now=new Date();var lunar=getLunar(now);var age=calcAge(now);var ph=tPhase(age);
    var ctx='【現在の釣りコンテキスト】\n日時：'+now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日\n月齢：'+age.toFixed(1)+' / '+ph+'\n旧暦：'+lunar.month+'月'+lunar.day+'日\n';
    var fishCtx=buildFishCtx();
    var histCtx='';
    if(state.history.length>1){var recent=state.history.slice(-12);histCtx='\n\n【この会話のやり取り】\n'+recent.map(function(m){return(m.role==='user'?'釣り人: ':'AI: ')+m.content;}).join('\n');}
    var prompt='',useSearch=false,useUrl='';
    if(state.mode==='search'){useSearch=true;prompt=AI_SYS+'\n\n'+ctx+fishCtx+histCtx+'\n\nGoogle検索で最新釣果情報を調べて回答してください。\n釣り人の質問：'+text;}
    else if(state.mode==='url'){useUrl=document.getElementById('url-inp').value.trim();prompt=AI_SYS+'\n\n'+ctx+fishCtx+histCtx+'\n\n釣り人の質問：'+text;}
    else if(state.mode==='kyureki'){
      useSearch=true;
      var ly1=getSameLunarDay(lunar.month,lunar.day,now.getFullYear()-1);
      var ly2=getSameLunarDay(lunar.month,lunar.day,now.getFullYear()-2);
      var d1=ly1?(ly1.getFullYear()+'年'+(ly1.getMonth()+1)+'月'+ly1.getDate()+'日'):'';
      var d2=ly2?(ly2.getFullYear()+'年'+(ly2.getMonth()+1)+'月'+ly2.getDate()+'日'):'';
      prompt=AI_SYS+'\n\n'+ctx+'今日は旧暦'+lunar.month+'月'+lunar.day+'日。昨年の同旧暦日（'+d1+'）と一昨年（'+d2+'）の釣果をGoogle検索で調べて比較してください。\n'+fishCtx+histCtx+'\n\n釣り人の質問：'+text;
    }
    else{prompt=AI_SYS+'\n\n'+ctx+fishCtx+histCtx+'\n\n釣り人の質問：'+text;}
    var resp=await callGemini(prompt,useSearch,useUrl||null,mc);
    typEl.remove();state.history.push({role:'assistant',content:resp});
    appendMsg('bot',resp);
    saveToFirestore(text,resp);
  }catch(err){typEl.remove();appendMsg('bot','エラー: '+err.message);}
  state.busy=false;document.getElementById('send-btn').disabled=false;ta.focus();
}

async function saveToFirestore(userText,botText){
  if(!state.uid||state.keyLogin||!window.__fb)return;
  try{
    var f=fb();
    if(!state.currentChatId){var chatRef=await f.addDoc(f.collection(f.db,'users',state.uid,'chats'),{title:userText.slice(0,30),createdAt:f.serverTimestamp(),updatedAt:f.serverTimestamp()});state.currentChatId=chatRef.id;}
    await f.addDoc(f.collection(f.db,'users',state.uid,'chats',state.currentChatId,'messages'),{role:'user',content:userText,ts:f.serverTimestamp()});
    await f.addDoc(f.collection(f.db,'users',state.uid,'chats',state.currentChatId,'messages'),{role:'assistant',content:botText,ts:f.serverTimestamp()});
  }catch(e){console.warn('Firestore保存エラー:',e);}
}

async function loadChatHistory(){
  if(!state.uid||state.keyLogin||!window.__fb)return;
  try{
    var f=fb();var q=f.query(f.collection(f.db,'users',state.uid,'chats'),f.orderBy('updatedAt','desc'),f.limit(20));
    var snap=await f.getDocs(q);var items=[];snap.forEach(function(d){items.push({id:d.id,...d.data()});});
    renderHistList(items);
  }catch(e){console.warn('履歴読込エラー:',e);}
}

function renderHistList(items){
  var el=document.getElementById('hist-list');
  if(!items.length){el.innerHTML='<div style="text-align:center;color:var(--txt3);font-size:13px;padding:20px">まだ会話履歴がありません</div>';return;}
  el.innerHTML=items.map(function(it){
    var t=it.title||'無題の会話';var d=it.createdAt&&it.createdAt.toDate?it.createdAt.toDate():new Date();
    var ds=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    return'<div style="background:var(--card2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;" onclick="loadChat(\''+it.id+'\')">'+'<div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+t+'</div>'+'<div style="font-size:11px;color:var(--txt3);">'+ds+'</div></div>';
  }).join('');
}

async function loadChat(chatId){
  if(!state.uid||!window.__fb)return;
  closeHistModal();
  try{
    var f=fb();var q=f.query(f.collection(f.db,'users',state.uid,'chats',chatId,'messages'),f.orderBy('ts','asc'));
    var snap=await f.getDocs(q);document.getElementById('msgs').innerHTML='';appendSys('会話を読み込みました');
    state.history=[];state.currentChatId=chatId;
    snap.forEach(function(d){var msg=d.data();appendMsg(msg.role==='user'?'user':'bot',msg.content);state.history.push({role:msg.role,content:msg.content});});
  }catch(e){appendSys('履歴の読み込みに失敗: '+e.message);}
}

function newChat(){state.currentChatId=null;state.history=[];document.getElementById('msgs').innerHTML='';appendSys('新しい会話を開始しました');closeHistModal();}
function showHistModal(){loadChatHistory();document.getElementById('hist-modal').style.display='flex';}
function closeHistModal(){document.getElementById('hist-modal').style.display='none';}

function appendMsg(role,text,imgSrc){
  var msgs=document.getElementById('msgs');var div=document.createElement('div');div.className='msg '+role;
  var av=document.createElement('div');av.className='avatar';av.textContent=role==='bot'?'🎣':'👤';
  var bub=document.createElement('div');bub.className='bubble';bub.textContent=text;
  if(imgSrc){var img=document.createElement('img');img.src=imgSrc;img.className='att';bub.appendChild(img);}
  div.appendChild(av);div.appendChild(bub);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;
}
function appendTyping(){
  var msgs=document.getElementById('msgs');var div=document.createElement('div');div.className='msg bot';
  var av=document.createElement('div');av.className='avatar';av.textContent='🎣';
  var bub=document.createElement('div');bub.className='bubble';
  bub.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(av);div.appendChild(bub);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div;
}
function appendSys(text){var msgs=document.getElementById('msgs');var div=document.createElement('div');div.className='sys-notice';div.textContent=text;msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function resizeTa(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,110)+'px';}
function onTaKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
</script>
